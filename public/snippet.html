
<script>
  (function() {
    // A simple configuration object
    const trackerConfig = {
      // This could be a unique ID for the store
      siteId: 'BergerStore', 
      // The URL where your main tracker.js file is hosted
      scriptUrl: 'https://your-cdn-or-server.com/tracker.js' 
    };

    // Create a script element to load the main tracker
    const script = document.createElement('script');
    script.src = trackerConfig.scriptUrl;
    script.async = true;
    
    // Pass config to the tracker script once it loads
    script.onload = function() {
      if (window.EngagementTracker) {
        window.EngagementTracker.init(trackerConfig);
      }
    };

    // Append the script to the head
    document.head.appendChild(script);
  })();
</script>
